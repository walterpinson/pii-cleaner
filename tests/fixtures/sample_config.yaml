dry_run: false
create_audit_report: true
retain_row_count: true
confidence_threshold: 0.5

identities:
  - "John Q Public"
  - "Jane Doe"
  - "ACME Holdings LLC"

aliases:
  - "Johnny Public"
  - "J. Q. Public"

custom_patterns:
  - name: "internal_customer_id"
    regex: "\\bCUST-[0-9]{6}\\b"
    action: "replace"
    replacement: "[CUSTOMER_ID]"

financial_rules:
  account_number:
    preserve_last_n: 4
    mask_char: "X"
  card_number:
    preserve_last_n: 4
    mask_char: "X"

csv:
  sensitive_columns: []
  preserve_headers: true

pdf:
  output_formats:
    txt: true
    md: true
    json_report: true
    pdf: false
